services:
  # 1. The Backend (Node.js)
  - type: web
    name: bloom-api
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: node backend/server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_VERSION
        value: 20 # Ensures compatibility

  # 2. The Frontend (Static Site)
  - type: web
    name: bloom-app
    env: static
    buildCommand: cd frontend && npm install --legacy-peer-deps && npm run build
    staticPublishPath: ./frontend/dist
    # Corrected routing for Single Page Applications (SPA)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html