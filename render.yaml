services:
  # 1. The Backend (Node.js)
  - type: web
    name: bloom-api
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: node backend/server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_VERSION
        value: 20 # Ensures compatibility
      - key: FRONTEND_URL
        fromService:
          name: bloom-app
          type: web
          property: host

  # 2. The Frontend (Static Site)
  - type: web
    name: bloom-app
    env: static
    envVars:
      - key: VITE_API_URL
        # This points to your 'bloom-api' service URL
        fromService:
          name: bloom-api
          type: web
          property: host
    buildCommand: cd frontend && npm install --legacy-peer-deps && npm run build
    staticPublishPath: ./frontend/dist
    # Corrected routing for Single Page Applications (SPA)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html